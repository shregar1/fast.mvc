<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FastMVC — API Server</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d0d0f;
      --surface: #151519;
      --surface-hover: #1e1e24;
      --border: #25252c;
      --border-hover: #353540;
      --text: #f0f0f5;
      --text-muted: #8a8a98;
      --accent: #00d4aa;
      --accent-hover: #00b894;
      --error: #ff5a65;
      --success: #00d4aa;
      --icon-color: #a1a1aa;
    }

    [data-theme="light"] {
      --bg: #fafafa;
      --surface: #ffffff;
      --surface-hover: #f4f4f5;
      --border: #e4e4e7;
      --border-hover: #d4d4d8;
      --text: #18181b;
      --text-muted: #71717a;
      --accent: #059669;
      --accent-hover: #047857;
      --error: #dc2626;
      --success: #059669;
      --icon-color: #52525b;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      transition: background 0.3s ease, color 0.3s ease;
    }

    .container {
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    /* Header with theme toggle */
    .header {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
    }

    .theme-toggle {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.5rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      color: var(--icon-color);
    }

    .theme-toggle:hover {
      background: var(--surface-hover);
      border-color: var(--border-hover);
    }

    .theme-toggle svg {
      width: 20px;
      height: 20px;
    }

    .theme-toggle .sun { display: none; }
    .theme-toggle .moon { display: block; }

    [data-theme="light"] .theme-toggle .sun { display: block; }
    [data-theme="light"] .theme-toggle .moon { display: none; }

    /* Logo */
    .logo {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2.5rem;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      transition: all 0.3s ease;
    }

    .logo-icon svg {
      width: 22px;
      height: 22px;
    }

    .logo-text {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .logo-text span {
      color: var(--accent);
      transition: color 0.3s ease;
    }

    /* Status Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      margin-bottom: 1rem;
      transition: all 0.3s ease;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--success);
      margin-bottom: 1rem;
      transition: color 0.3s ease;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      background: var(--success);
      border-radius: 50%;
      animation: pulse 2s infinite;
      transition: background 0.3s ease;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 0.875rem;
      line-height: 1.5;
      margin-bottom: 1.5rem;
      transition: color 0.3s ease;
    }

    /* Base URL */
    .base-url {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.875rem 1rem;
      margin-bottom: 1.5rem;
      text-align: left;
      transition: all 0.3s ease;
    }

    .base-url-label {
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 0.375rem;
      transition: color 0.3s ease;
    }

    .base-url-value {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.8125rem;
      color: var(--text);
      word-break: break-all;
      transition: color 0.3s ease;
    }

    /* Links Grid */
    .links {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.75rem;
    }

    .link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.8125rem;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.15s ease;
    }

    .link:hover {
      background: var(--surface-hover);
      border-color: var(--border-hover);
    }

    .link svg {
      width: 16px;
      height: 16px;
      opacity: 0.7;
    }

    .link-primary {
      grid-column: span 2;
      background: var(--accent);
      border-color: var(--accent);
      color: #ffffff;
      transition: all 0.3s ease;
    }

    .link-primary:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }

    [data-theme="light"] .link-primary {
      color: #ffffff;
    }

    .link-primary svg {
      opacity: 0.9;
    }

    /* Footer */
    .footer {
      color: var(--text-muted);
      font-size: 0.75rem;
      transition: color 0.3s ease;
    }

    .footer a {
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.15s;
    }

    .footer a:hover {
      color: var(--text);
    }

    .footer-dot {
      margin: 0 0.5rem;
      opacity: 0.4;
    }

    /* Responsive */
    @media (max-width: 380px) {
      .links {
        grid-template-columns: 1fr;
      }
      
      .link-primary {
        grid-column: span 1;
      }

      .header {
        top: 1rem;
        right: 1rem;
      }
    }
  </style>
</head>
<body>
  <!-- Theme Toggle -->
  <div class="header">
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
      <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
      <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/>
        <line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
    </button>
  </div>

  <div class="container">
    <!-- Logo -->
    <div class="logo">
      <div class="logo-icon">
        <img src="logo-icon.svg" alt="FastMVC" style="width: 22px; height: 22px; color: var(--accent);">
      </div>
      <div class="logo-text">Fast<span>MVC</span></div>
    </div>

    <!-- Main Card -->
    <div class="card">
      <div class="status">
        <span class="status-dot"></span>
        Running
      </div>
      
      <h1>API Server</h1>
      <p class="subtitle">Production-grade FastAPI stack with MVC architecture</p>
      
      <div class="base-url">
        <div class="base-url-label">Base URL</div>
        <div class="base-url-value" id="origin">http://localhost:8000</div>
      </div>
      
      <nav class="links" aria-label="Quick links">
        <a class="link link-primary" href="/docs">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10 9 9 9 8 9"/>
          </svg>
          Swagger Docs
        </a>
        <a class="link" href="/redoc">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
          </svg>
          ReDoc
        </a>
        <a class="link" href="/health">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
          </svg>
          Health
        </a>
        <a class="link" href="/openapi.json">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="16 18 22 12 16 6"/>
            <polyline points="8 6 2 12 8 18"/>
          </svg>
          OpenAPI
        </a>
      </nav>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <a href="https://github.com/shregar1/fastMVC" target="_blank" rel="noopener">GitHub</a>
      <span class="footer-dot">·</span>
      <a href="https://fastapi-mvc.dev" target="_blank" rel="noopener">Documentation</a>
    </footer>
  </div>

  <script>
    (function () {
      // Theme handling
      const themeToggle = document.getElementById('theme-toggle');
      const html = document.documentElement;
      
      // Get saved theme or default to dark
      const savedTheme = localStorage.getItem('theme') || 'dark';
      html.setAttribute('data-theme', savedTheme);
      
      // Toggle theme
      themeToggle.addEventListener('click', () => {
        const currentTheme = html.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
      });

      // Set origin
      var el = document.getElementById("origin");
      if (el) {
        el.textContent = window.location.origin || "http://localhost:8000";
      }
    })();
  </script>
</body>
</html>
