[pytest]
# Tests live at repo root: tests/
testpaths = tests
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Asyncio mode
asyncio_mode = auto

# Default run: no coverage gate (use `pytest --cov=...` in CI when needed)
# Framework tests are excluded by default - developers should add their tests to tests/dev/ or tests/
addopts = -v --ignore=tests/framework

# Ignore patterns (framework tests are ignored by default)
norecursedirs =
    .git
    __pycache__
    htmlcov
    .pytest_cache
    venv
    .venv
    node_modules
    framework

# Test markers
markers =
    unit: Unit tests
    integration: Integration tests
    api: API tests
    slow: Slow running tests
    framework: FastX framework tests (run with --framework)
